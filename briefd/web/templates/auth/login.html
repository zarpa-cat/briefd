{% extends "base.html" %}
{% block title %}Sign in — Briefd{% endblock %}
{% block content %}
<h1>Sign in</h1>
<p style="color: #6b7280;">Enter your email and we'll send you a magic link. No password needed.</p>

{% if error %}
<p style="color: #dc2626; padding: 0.75rem; background: #fef2f2; border-radius: 6px;">{{ error }}</p>
{% endif %}

<form method="post" action="/auth/request" style="margin-top: 1.5rem;">
  <div style="margin-bottom: 1rem;">
    <label for="email" style="display: block; margin-bottom: 0.375rem; font-weight: 500;">Email</label>
    <input type="email" id="email" name="email" required autofocus
           style="width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db;
                  border-radius: 6px; font-size: 1rem; outline: none;">
  </div>
  <button type="submit"
          style="padding: 0.5rem 1.5rem; background: #2563eb; color: white;
                 border: none; border-radius: 6px; font-size: 1rem; cursor: pointer;">
    Send magic link
  </button>
</form>
{% endblock %}
